<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITA HUB Personality Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A6C41;
            --primary-light: #84AE94;
            --secondary: #7DB942;
            --secondary-light: #b8d494;
            --accent: #ECCE17;
            --accent-light: #E9D565;
            --accent-lighter: #F6E78C;
            --turquoise: #72BEB7;
            --turquoise-light: #B2D7CE;
            --turquoise-lighter: #D5EDE8;
            --bg-light: #EAF5F4;
            --bg-white: #FFFFFF;
            --text-dark: #104736;
            --text-medium: #3A6B5A;
            --eichhoernchen: #7DB942;
            --flamingo: #72BEB7;
            --murmeltier: #1A6C41;
            --shadow: rgba(26, 108, 65, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--turquoise-lighter) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--bg-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px var(--shadow);
            padding: 50px 60px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-medium);
            margin-bottom: 2rem;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-light);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            background: var(--bg-white);
            border: 2px solid var(--turquoise-light);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            position: relative;
            overflow: hidden;
        }

        .answer-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
            opacity: 0.1;
        }

        .answer-btn:hover {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .answer-btn:hover::before {
            width: 100%;
        }

        .answer-label {
            font-weight: 700;
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .answer-btn.selected {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .answer-btn.selected::before {
            width: 100%;
        }

        .answer-btn.has-gif {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .answer-gif {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 12px;
            margin: 0.5rem 0;
        }

        .answer-text {
            display: inline;
        }

        .start-btn, .result-btn, .back-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 20px rgba(26, 108, 65, 0.3);
        }

        .start-btn:hover, .result-btn:hover, .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(26, 108, 65, 0.4);
        }

        .back-btn {
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-light) 100%);
        }

        .show-result-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 20px rgba(26, 108, 65, 0.3);
        }

        .show-result-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(26, 108, 65, 0.4);
        }

        .show-result-btn:disabled,
        .show-result-btn.disabled {
            background: linear-gradient(135deg, #A0A0A0 0%, #C0C0C0 100%);
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }
        }

        .media-btn {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 20px rgba(125, 185, 66, 0.3);
            margin-top: 1.5rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .media-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(125, 185, 66, 0.4);
        }

        .media-btn,
.media-btn:link,
.media-btn:visited,
.media-btn:hover,
.media-btn:active,
.media-btn:focus {
    color: white;
    text-decoration: none;
}

        .modal-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .modal-buttons .back-btn,
        .modal-buttons .media-btn {
            flex: 1;
            min-width: 200px;
            margin-top: 0;
        }

        .progress-bar {
            height: 8px;
            background: var(--turquoise-lighter);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            color: var(--text-medium);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .score-display {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .score-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            background: var(--bg-light);
            border-radius: 16px;
            border-left: 6px solid var(--primary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .score-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
            background: var(--turquoise-lighter);
        }

        .score-item.eichhoernchen {
            border-left-color: var(--eichhoernchen);
        }

        .score-item.flamingo {
            border-left-color: var(--flamingo);
        }

        .score-item.murmeltier {
            border-left-color: var(--murmeltier);
        }

        .score-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .score-emoji {
            font-size: 2.5rem;
            animation: bounce 2s infinite;
            background: transparent;
        }

        .score-emoji img {
            width: 2.5rem;
            height: 2.5rem;
            display: block;
            background: transparent;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .score-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        .score-points {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .click-hint {
            font-size: 0.85rem;
            color: var(--text-medium);
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .result-content {
            background: var(--bg-light);
            padding: 2rem;
            border-radius: 16px;
            margin: 2rem 0;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .result-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .result-tip {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            margin-top: 1.5rem;
        }

        .result-tip-title {
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 71, 54, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 80px rgba(16, 71, 54, 0.3);
            animation: modalSlideIn 0.4s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .modal-emoji {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .modal-emoji img {
            width: 4rem;
            height: 4rem;
            display: block;
            margin: 0 auto;
            background: transparent;
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-body {
            color: var(--text-dark);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .modal-body p {
            margin-bottom: 1rem;
        }

        .modal-body h4 {
            color: var(--secondary);
            margin: 1.5rem 0 0.75rem 0;
            font-size: 1.1rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--bg-light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--turquoise-light);
            transform: rotate(90deg);
        }

        .winner-badge {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: var(--text-dark);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
            display: inline-block;
        }

        .gif-container {
            margin: 1.5rem 0;
            text-align: center;
        }

        .gif-container img {
            max-width: 300px;
            border-radius: 12px;
            box-shadow: 0 8px 20px var(--shadow);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .question {
                font-size: 1.1rem;
            }

            .answer-btn {
                padding: 1.2rem 1.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.5rem;
            }
        }
    

/* Play-Button einfarbig (CSS-Dreieck) */
.play-audio-btn {
    background: var(--secondary);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    margin-left: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    vertical-align: middle;
    line-height: 1;
    position: relative;
}

.play-audio-btn::before {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-left: 8px solid #FFFFFF;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
}

.play-audio-btn:hover {
    transform: scale(1.15);
    background: var(--primary);
}

.play-audio-btn.is-playing {
    background: var(--primary);
    animation: playPulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(26, 108, 65, 0.35);
}

        @keyframes playPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 108, 65, 0.35); }
            60% { transform: scale(1.12); box-shadow: 0 0 0 10px rgba(26, 108, 65, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 108, 65, 0); }
        }
60% {
        transform: scale(1.12);
        box-shadow: 0 0 0 10px rgba(26, 108, 65, 0);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(26, 108, 65, 0);
    }

/* --- Link-Farben (einheitlich, alle Zustände) --- */
a,
a:link,
a:visited,
a:hover,
a:active,
a:focus {
    color: var(--turquoise);
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 600;
    transition: color 0.2s ease;
}

a:hover,
a:focus {
    color: var(--primary);
    text-decoration: underline;
}

/* --- KITA HUB Logo oben rechts --- */
.kita-logo {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 60px;
    height: auto;
    z-index: 999;
    pointer-events: none;
    opacity: 0.95;
}

/* Mobile etwas kleiner */
@media (max-width: 768px) {
    .kita-logo {
        width: 40px;
        top: 16px;
        right: 16px;
    }
}
    </style>
</head>
<body>
    <div class="container">

    <img src="https://static.kita.bayern/files/personality-test/logo2.png"
         alt="KITA HUB Logo"
         class="kita-logo">
        <!-- Welcome Screen -->
        <div id="welcome" class="screen active">
            <h1>Personality Test</h1><br>
            <h1> Welcher KITA HUB Typ bist du?</h1>
            <p class="subtitle">Finde es heraus! Dieser Test soll vor allem Spaß machen und wird dir am Ende passende Tipps zum KITA HUB liefern 😊.</p>
            <p class="subtitle">Viel Spaß!</p>
            <button class="start-btn" onclick="startTest()">Los geht's!</button>
        </div>

        <!-- Questions -->
        <div id="questions" class="screen">
            <div class="progress-text">Frage <span id="current-q">1</span> von 6</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            <div class="question" id="question-text"></div>
            <div class="answers" id="answers"></div>
            <div class="button-group" id="button-group" style="display: none;">
                <button class="back-btn" id="back-btn" onclick="goBack()">← Zurück</button>
                <button class="show-result-btn" id="show-result-btn" onclick="showResultsNow()" style="display: none;">Ergebnis ansehen</button>
            </div>
        </div>

        <!-- Score Display -->
        <div id="score-screen" class="screen">
            <h2>Dein Ergebnis:</h2>
            <p class="subtitle">Das ist dein KITA HUB Typ! Klicke auf dein Ergebnis:</p>
            <div class="score-display" id="score-display">
                <!-- Scores werden dynamisch eingefügt und sortiert -->
            </div>
            <button class="result-btn" onclick="location.reload()">Nochmal testen!</button>
        </div>
    </div>

    <!-- Modal für Tier-Infos -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <span class="modal-emoji" id="modal-emoji"></span>
                <h3 class="modal-title" id="modal-title"></h3>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-buttons">
                <a href="https://www.medien.kita.bayern/edu-sharing/components/search" target="_blank" class="media-btn">Zeig mir mehr<br>Beispiele</a>
                <button class="back-btn" onclick="closeModal()">Zurück zum Ergebnis</button>
                
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Du kommst morgens in die Kita und jemand hat vergessen den Personalraum aufzuräumen. Was tust du?",
                answers: [
                    { text: "Ich räume schnell auf, sortiere alles neu und beschrifte auch noch die Fächer.", type: "eichhoernchen" },
                    { text: "Ich baue aus dem Chaos ein spontanes Lernangebot für meine Kolleginnen und Kollegen zum Thema 'Selbstorganisation'.", type: "flamingo" },
                    { text: "Ich bespreche das ruhig im Team - sowas klären wir gemeinsam.", type: "murmeltier" }
                ]
            },
            {
                question: "Wie ist der Kita-Essensplan für die nächste Woche?",
                answers: [
                    { text: "Da lass ich mich einfach kulinarisch überraschen! Keine Ahnung.", type: "murmeltier" },
                    { text: "Ich schaue schnell selbst in unser Kita-App nach.", type: "flamingo" },
                    { text: "Den Essensplan hat jemand ausgedruckt und aufgehängt. Alles easy!", type: "murmeltier" }
                ]
            },
            {
                question: "Mittags stellt ihr fest, dass die Eistruhe defekt ist. Du musst dich schnell entscheiden:",
                answers: [
                    { text: "Ich ziehe den Stecker, verteile das Eis an die Kinder und verfluche die Eistruhe.", type: "murmeltier" },
                    { text: "Ich repariere die Eistruhe mit der Hilfe von ChatGPT, Youtube und Reddit - und zwar gleichzeitig. Sie geht sofort wieder!", type: "flamingo" },
                    { text: "Unsere Hausmeisterin ist eh gerade da! Was für ein Glück - aber erstmal verteile ich das Eis an alle Kinder!", type: "eichhoernchen" }
                ]
            },
            {
                question: "Was für ein Typ bist du? Vor dir ist ein riesiges Buffet, das wirklich lecker aussieht und gut riecht. Hmmm...",
                answers: [
                    { text: "Ich freue mich, dass es was gibt, was ich kenne.", type: "murmeltier" },
                    { text: "Wunderbar, ich probiere alles aus, was ich noch gar nie gegessen habe.", type: "flamingo" },
                    { text: "Die Mischung macht's! Ich probiere auf jeden Fall auch ein paar neue Sachen!", type: "eichhoernchen" }
                ]
            },
            {
                question: "So schätze ich mich ein, wenn es um den Umgang mit digitalen Tools geht:",
                answers: [
                    { text: "Ich bin so schnell, dass meine Finger kaum hinterherkommen.", type: "flamingo", gif: "https://static.kita.bayern/files/personality-test/oma.gif" },
                    { text: "Ich freue mich über jeden Erfolg. Dann reicht es auch erstmal wieder.", type: "eichhoernchen", gif: "https://static.kita.bayern/files/personality-test/woman.gif" },
                    { text: "Huch!? Wo hab ich denn hier schon wieder geklickt? Hab ich das Internet gelöscht?", type: "murmeltier", gif: "https://static.kita.bayern/files/personality-test/cat.gif" }
                ]
            },
            {
                question: "Letzte Frage! Eine Fee bietet dir an, dass du mit einem Zauberstab Aufgaben in deinem Kita-Alltag automatisch erledigen könntest.",
                answers: [

        let currentQuestion = 0;
        let scores = {
            eichhoernchen: 0,
            flamingo: 0,
            murmeltier: 0
        };
        let selectedAnswers = []; // Speichert die gewählten Antworten

        function startTest() {
            showScreen('questions');
            showQuestion();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('current-q').textContent = currentQuestion + 1;
            
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            const answersDiv = document.getElementById('answers');
            answersDiv.innerHTML = '';

            q.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                if (answer.gif) {
                    btn.classList.add('has-gif');
                }
                btn.setAttribute('data-type', answer.type);
                
                let btnContent = `<span class="answer-label">${String.fromCharCode(97 + index)})</span>`;
                if (answer.gif) {
                    btnContent += `<img src="${answer.gif}" alt="" class="answer-gif" />`;
                }
                btnContent += `<span class="answer-text">${answer.text}</span>`;
                btn.innerHTML = btnContent;
                
                btn.onclick = () => selectAnswer(answer.type);
                
                // Wenn bei Frage 6 bereits eine Antwort gewählt wurde, markiere sie
                if (currentQuestion === questions.length - 1 && selectedAnswers[currentQuestion] === answer.type) {
                    btn.classList.add('selected');
                }
                
                answersDiv.appendChild(btn);
            });

            // Button-Gruppe und einzelne Buttons anzeigen/verstecken
            const buttonGroup = document.getElementById('button-group');
            const backBtn = document.getElementById('back-btn');
            const showResultBtn = document.getElementById('show-result-btn');
            
            // Zurück-Button nur ab Frage 2 anzeigen
            if (currentQuestion > 0) {
                backBtn.style.display = 'block';
            } else {
                backBtn.style.display = 'none';
            }
            
            // "Ergebnis ansehen" Button nur bei letzter Frage anzeigen
            if (currentQuestion === questions.length - 1) {
                showResultBtn.style.display = 'block';
                // Button ist disabled, solange keine Antwort gewählt wurde
                if (selectedAnswers[currentQuestion]) {
                    showResultBtn.disabled = false;
                    showResultBtn.classList.remove('disabled');
                } else {
                    showResultBtn.disabled = true;
                    showResultBtn.classList.add('disabled');
                }
            } else {
                showResultBtn.style.display = 'none';
            }
            
            // Button-Gruppe anzeigen, wenn mindestens ein Button sichtbar ist
            if (currentQuestion > 0 || currentQuestion === questions.length - 1) {
                buttonGroup.style.display = 'flex';
            } else {
                buttonGroup.style.display = 'none';
            }
        }

        function selectAnswer(type) {
            // Wenn wir bei Frage 6 sind und bereits eine Antwort gewählt wurde, entferne deren Punktzahl
            if (currentQuestion === questions.length - 1 && selectedAnswers[currentQuestion]) {
                scores[selectedAnswers[currentQuestion]]--;
            }
            
            selectedAnswers[currentQuestion] = type; // Speichere die Antwort
            scores[type]++;
            
            // Wenn wir bei Frage 6 sind, markiere die Auswahl und aktiviere den Button
            if (currentQuestion === questions.length - 1) {
                // Entferne alle bisherigen Markierungen
                document.querySelectorAll('.answer-btn').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
                // Markiere die neu gewählte Antwort
                document.querySelector(`.answer-btn[data-type="${type}"]`).classList.add('selected');
                
                // Aktiviere den "Ergebnis ansehen" Button
                const showResultBtn = document.getElementById('show-result-btn');
                showResultBtn.disabled = false;
                showResultBtn.classList.remove('disabled');
                // NICHT automatisch zum Ergebnis gehen - Nutzer muss auf Button klicken
                return;
            }
            
            currentQuestion++;

            if (currentQuestion < questions.length) {
                setTimeout(showQuestion, 300);
            }
        }

        function goBack() {
            if (currentQuestion > 0) {
                currentQuestion--;
                // Entferne die Punktzahl der vorherigen Antwort
                if (selectedAnswers[currentQuestion]) {
                    scores[selectedAnswers[currentQuestion]]--;
                }
                showQuestion();
            }
        }

        function showResultsNow() {
            // Springe direkt zum Ergebnis
            showScores();
        }

        function showScores() {
            // Sortiere die Tiere nach Punktzahl (absteigend)
            const sortedAnimals = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
            
            // Finde den Gewinner (höchste Punktzahl)
            const winner = sortedAnimals[0];
            
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.innerHTML = '';

            sortedAnimals.forEach((animal, index) => {
                const info = animalInfo[animal];
                const isWinner = index === 0;
                
                const scoreItem = document.createElement('div');
                scoreItem.className = `score-item ${animal}`;
                scoreItem.onclick = () => openModal(animal);
                
                scoreItem.innerHTML = `
                    <div class="score-left">
                        <div class="score-emoji"><img src="${info.svg}" alt="${info.title}" /></div>
                        <div>
                            <div class="score-name">
                                ${info.title}
                                ${isWinner ? '<span class="winner-badge">🏆 Dein Typ!</span>' : ''}
                            </div>
                            <div class="click-hint">👆 Klicke für mehr Infos</div>
                        </div>
                    </div>
                    <div class="score-points">${scores[animal]}</div>
                `;
                
                scoreDisplay.appendChild(scoreItem);
            });

            showScreen('score-screen');
        }

        function openModal(animalType) {
            
            stopSiaSnippet();
const info = animalInfo[animalType];
            const modalEmoji = document.getElementById('modal-emoji');
            modalEmoji.innerHTML = `<img src="${info.svg}" alt="${info.title}" />`;
            document.getElementById('modal-title').textContent = info.title;
            document.getElementById('modal-body').innerHTML = info.detailedInfo;
            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            
            stopSiaSnippet();
document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOutside(event) {
            if (event.target === document.getElementById('modal-overlay')) {
                closeModal();
            }
        }

        // ESC-Taste zum Schließen des Modals
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    
// --- Sia Snippet (Play-Button im Eichhörnchen-Text) ---
let siaAudio = null;
let siaBtnEl = null;

function playSiaSnippet(btnEl) {
    // Speichere den zuletzt genutzten Button (für Stop beim Modal-Schließen)
    siaBtnEl = btnEl || siaBtnEl;

    if (!siaAudio) {
        siaAudio = new Audio("sia-snippet.mp3");
        // Wenn Audio fertig ist, Pulsanimation stoppen
        siaAudio.addEventListener("ended", () => {
            if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
        });
        // Falls es aus irgendeinem Grund pausiert, Puls aus
        siaAudio.addEventListener("pause", () => {
            if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
        });
    }

    if (siaAudio.paused) {
        // Andere Button-Instanzen (falls Modal mehrfach geöffnet) sicherheitshalber deaktivieren
        document.querySelectorAll(".play-audio-btn.is-playing").forEach(el => el.classList.remove("is-playing"));

        siaAudio.currentTime = 0;
        const playPromise = siaAudio.play();
        if (siaBtnEl) siaBtnEl.classList.add("is-playing");

        // Browser können play() blocken, wenn kein User-Gesture erkannt wird.
        if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {
                if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
            });
        }
    } else {
        siaAudio.pause();
        siaAudio.currentTime = 0;
        if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
    }
}

function stopSiaSnippet() {
    if (siaAudio) {
        siaAudio.pause();
        siaAudio.currentTime = 0;
    }
    if (siaBtnEl) {
        siaBtnEl.classList.remove("is-playing");
    }
    // Falls Modal neu gerendert wurde: alle eventuellen Buttons aufräumen
    document.querySelectorAll(".play-audio-btn.is-playing").forEach(el => el.classList.remove("is-playing"));
}
    </script>
