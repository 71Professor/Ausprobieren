<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITA HUB Personality Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A6C41;
            --primary-light: #84AE94;
            --secondary: #7DB942;
            --secondary-light: #b8d494;
            --accent: #ECCE17;
            --accent-light: #E9D565;
            --accent-lighter: #F6E78C;
            --turquoise: #72BEB7;
            --turquoise-light: #B2D7CE;
            --turquoise-lighter: #D5EDE8;
            --bg-light: #EAF5F4;
            --bg-white: #FFFFFF;
            --text-dark: #104736;
            --text-medium: #3A6B5A;
            --eichhoernchen: #7DB942;
            --flamingo: #72BEB7;
            --murmeltier: #1A6C41;
            --shadow: rgba(26, 108, 65, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--turquoise-lighter) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--bg-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px var(--shadow);
            padding: 50px 60px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-medium);
            margin-bottom: 2rem;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-light);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            background: var(--bg-white);
            border: 2px solid var(--turquoise-light);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            position: relative;
            overflow: hidden;
        }

        .answer-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
            opacity: 0.1;
        }

        .answer-btn:hover {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .answer-btn:hover::before {
            width: 100%;
        }

        .answer-label {
            font-weight: 700;
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .answer-btn.selected {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .answer-btn.selected::before {
            width: 100%;
        }

        .answer-btn.has-gif {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .answer-gif {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 12px;
            margin: 0.5rem 0;
        }

        .answer-text {
            display: inline;
        }

        .start-btn, .result-btn, .back-btn, .show-result-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 20px rgba(26, 108, 65, 0.3);
        }

        .start-btn:hover, .result-btn:hover, .back-btn:hover, .show-result-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(26, 108, 65, 0.4);
        }

        .back-btn {
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-light) 100%);
        }

        .show-result-btn:disabled,
        .show-result-btn.disabled {
            background: linear-gradient(135deg, #A0A0A0 0%, #C0C0C0 100%);
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }
        }

        .media-btn {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 20px rgba(125, 185, 66, 0.3);
            margin-top: 1.5rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .media-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(125, 185, 66, 0.4);
        }

        .media-btn,
.media-btn:link,
.media-btn:visited,
.media-btn:hover,
.media-btn:active,
.media-btn:focus {
    color: white;
    text-decoration: none;
}

        .modal-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .modal-buttons .back-btn,
        .modal-buttons .media-btn {
            flex: 1;
            min-width: 200px;
            margin-top: 0;
        }

        .progress-bar {
            height: 8px;
            background: var(--turquoise-lighter);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            color: var(--text-medium);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .score-display {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .score-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            background: var(--bg-light);
            border-radius: 16px;
            border-left: 6px solid var(--primary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .score-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px var(--shadow);
            background: var(--turquoise-lighter);
        }

        .score-item.eichhoernchen {
            border-left-color: var(--eichhoernchen);
        }

        .score-item.flamingo {
            border-left-color: var(--flamingo);
        }

        .score-item.murmeltier {
            border-left-color: var(--murmeltier);
        }

        .score-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .score-emoji {
            font-size: 2.5rem;
            animation: bounce 2s infinite;
            background: transparent;
        }

        .score-emoji img {
            width: 2.5rem;
            height: 2.5rem;
            display: block;
            background: transparent;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .score-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        .score-points {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .click-hint {
            font-size: 0.85rem;
            color: var(--text-medium);
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .result-content {
            background: var(--bg-light);
            padding: 2rem;
            border-radius: 16px;
            margin: 2rem 0;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .result-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .result-tip {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            margin-top: 1.5rem;
        }

        .result-tip-title {
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 71, 54, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: min(780px, 85vw);
            width: 85vw;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 80px rgba(16, 71, 54, 0.3);
            animation: modalSlideIn 0.4s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .modal-emoji {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .modal-emoji img {
            width: 4rem;
            height: 4rem;
            display: block;
            margin: 0 auto;
            background: transparent;
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-body {
            color: var(--text-dark);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .modal-body p {
            margin-bottom: 1rem;
        }

        .modal-body h4 {
            color: var(--secondary);
            margin: 1.5rem 0 0.75rem 0;
            font-size: 1.1rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--bg-light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--turquoise-light);
            transform: rotate(90deg);
        }

        .winner-badge {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: var(--text-dark);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
            display: inline-block;
        }

        .gif-container {
            margin: 1.5rem 0;
            text-align: center;
        }

        .gif-container img {
            max-width: 300px;
            border-radius: 12px;
            box-shadow: 0 8px 20px var(--shadow);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .question {
                font-size: 1.1rem;
            }

            .answer-btn {
                padding: 1.2rem 1.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.5rem;
            }
        }
    

/* Play-Button einfarbig (CSS-Dreieck) */
.play-audio-btn {
    background: var(--secondary);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    margin-left: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    vertical-align: middle;
    line-height: 1;
    position: relative;
}

.play-audio-btn::before {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-left: 8px solid #FFFFFF;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
}

.play-audio-btn:hover {
    transform: scale(1.15);
    background: var(--primary);
}

.play-audio-btn.is-playing {
    background: var(--primary);
    animation: playPulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(26, 108, 65, 0.35);
}

        @keyframes playPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 108, 65, 0.35); }
            60% { transform: scale(1.12); box-shadow: 0 0 0 10px rgba(26, 108, 65, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 108, 65, 0); }
        }

/* --- Link-Farben (einheitlich, alle Zustände) --- */
a,
a:link,
a:visited,
a:hover,
a:active,
a:focus {
    color: var(--turquoise);
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 600;
    transition: color 0.2s ease;
}

a:hover,
a:focus {
    color: var(--primary);
    text-decoration: underline;
}

/* --- KITA HUB Logo oben rechts --- */
.kita-logo {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 60px;
    height: auto;
    z-index: 999;
    pointer-events: none;
    opacity: 0.95;
}

/* Mobile etwas kleiner */
@media (max-width: 768px) {
    .kita-logo {
        width: 40px;
        top: 16px;
        right: 16px;
    }
}

/* ============================================================
   Examples Overlay
   ============================================================ */
.examples-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(16, 71, 54, 0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
}

.examples-overlay.active {
    display: flex;
}

.examples-dialog {
    max-width: min(780px, 85vw);
    width: 85vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--bg-light) 0%, var(--turquoise-lighter) 100%);
    box-shadow: 0 25px 80px rgba(16, 71, 54, 0.3);
    animation: modalSlideIn 0.4s ease;
}

.examples-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 1.1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
}

.examples-header h2 {
    font-family: 'Outfit', sans-serif;
    color: white;
    font-size: 1.4rem;
    font-weight: 700;
}

.examples-close {
    position: absolute;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    color: white;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
}

.examples-close:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-50%) rotate(90deg);
}

.examples-tabs {
    background: white;
    padding: 0.9rem 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    border-bottom: 2px solid var(--turquoise-lighter);
    flex-shrink: 0;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px var(--shadow);
}

.examples-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    padding: 0.65rem 0.85rem;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 2px solid transparent;
    background: var(--bg-light);
    min-width: 72px;
    max-width: 92px;
    font-family: 'DM Sans', sans-serif;
}

.examples-tab:hover {
    border-color: var(--turquoise-light);
    background: var(--turquoise-lighter);
    transform: translateY(-2px);
}

.examples-tab.active {
    border-color: var(--secondary);
    background: linear-gradient(135deg, var(--secondary-light) 0%, var(--turquoise-lighter) 100%);
}

.examples-tab svg {
    width: 26px;
    height: 26px;
    stroke: var(--text-medium);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.examples-tab.active svg {
    stroke: var(--primary);
}

.examples-tab-label {
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--text-medium);
    text-align: center;
    line-height: 1.2;
}

.examples-tab.active .examples-tab-label {
    color: var(--primary);
}

.examples-content {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 1.5rem 3rem;
}

.examples-chapter {
    display: none;
    max-width: 760px;
    margin: 0 auto;
    animation: fadeIn 0.35s ease;
}

.examples-chapter.active {
    display: block;
}

.examples-chapter-card {
    background: white;
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 8px 30px var(--shadow);
}

.examples-chapter-header {
    display: flex;
    align-items: flex-start;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
}

.examples-chapter-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, var(--turquoise-lighter) 0%, var(--bg-light) 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid var(--turquoise-light);
}

.examples-chapter-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--primary);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.examples-chapter-meta {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    padding-top: 0.2rem;
}

.examples-chapter-num {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--turquoise);
    text-transform: uppercase;
    letter-spacing: 0.09em;
}

.examples-chapter-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.25;
}

.examples-chapter-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text-dark);
}

/* ── Rich HTML-Inhaltsbereich ───────────────────────────────────
   Hier könnt ihr mit einfachen HTML-Tags Texte, Überschriften
   und Bilder gestalten. Einfach die Elemente unten verwenden.
────────────────────────────────────────────────────────────── */
.examples-chapter-content {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text-dark);
}

/* Unterüberschriften innerhalb des Inhaltsbereichs */
.examples-chapter-content h4 {
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--primary);
    margin: 1.4rem 0 0.35rem;
}

/* Absätze */
.examples-chapter-content p {
    margin-bottom: 0.8rem;
}

/* Bilder – automatisch volle Breite, abgerundete Ecken */
.examples-chapter-content img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 0.8rem 0;
    display: block;
}

/* Aufzählungslisten */
.examples-chapter-content ul {
    margin: 0.4rem 0 0.8rem 1.4rem;
}
.examples-chapter-content ul li {

            document.getElementById(screenId).classList.add('active');

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('current-q').textContent = currentQuestion + 1;
            
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            const answersDiv = document.getElementById('answers');
            answersDiv.innerHTML = '';

            q.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                if (answer.gif) {
                    btn.classList.add('has-gif');
                }
                btn.setAttribute('data-type', answer.type);
                
                let btnContent = `<span class="answer-label">${String.fromCharCode(97 + index)})</span>`;
                if (answer.gif) {
                    btnContent += `<img src="${answer.gif}" alt="" class="answer-gif" />`;
                }
                btnContent += `<span class="answer-text">${answer.text}</span>`;
                btn.innerHTML = btnContent;
                
                btn.onclick = () => selectAnswer(answer.type);
                
                // Wenn bei Frage 6 bereits eine Antwort gewählt wurde, markiere sie
                if (currentQuestion === questions.length - 1 && selectedAnswers[currentQuestion] === answer.type) {
                    btn.classList.add('selected');
                }
                
                answersDiv.appendChild(btn);
            });

            // Button-Gruppe und einzelne Buttons anzeigen/verstecken
            const buttonGroup = document.getElementById('button-group');
            const backBtn = document.getElementById('back-btn');
            const showResultBtn = document.getElementById('show-result-btn');
            
            // Zurück-Button nur ab Frage 2 anzeigen
            if (currentQuestion > 0) {
                backBtn.style.display = 'block';
            } else {
                backBtn.style.display = 'none';
            }
            
            // "Ergebnis ansehen" Button nur bei letzter Frage anzeigen
            if (currentQuestion === questions.length - 1) {
                showResultBtn.style.display = 'block';
                // Button ist disabled, solange keine Antwort gewählt wurde
                if (selectedAnswers[currentQuestion]) {
                    showResultBtn.disabled = false;
                    showResultBtn.classList.remove('disabled');
                } else {
                    showResultBtn.disabled = true;
                    showResultBtn.classList.add('disabled');
                }
            } else {
                showResultBtn.style.display = 'none';
            }
            
            // Button-Gruppe anzeigen, wenn mindestens ein Button sichtbar ist
            if (currentQuestion > 0 || currentQuestion === questions.length - 1) {
                buttonGroup.style.display = 'flex';
            } else {
                buttonGroup.style.display = 'none';
            }
        }

        function selectAnswer(type) {
            // Wenn wir bei Frage 6 sind und bereits eine Antwort gewählt wurde, entferne deren Punktzahl

                scores[selectedAnswers[currentQuestion]]--;
            }
            
            selectedAnswers[currentQuestion] = type; // Speichere die Antwort
            scores[type]++;
            
            // Wenn wir bei Frage 6 sind, markiere die Auswahl und aktiviere den Button
            if (currentQuestion === questions.length - 1) {
                // Entferne alle bisherigen Markierungen
                document.querySelectorAll('.answer-btn').forEach(btn => {

                // Markiere die neu gewählte Antwort

// --- Sia Snippet (Play-Button im Eichhörnchen-Text) ---
let siaAudio = null;
let siaBtnEl = null;

function playSiaSnippet(btnEl) {
    // Speichere den zuletzt genutzten Button (für Stop beim Modal-Schließen)
    siaBtnEl = btnEl || siaBtnEl;

    if (!siaAudio) {
        siaAudio = new Audio("sia-snippet.mp3");
        // Wenn Audio fertig ist, Pulsanimation stoppen
        siaAudio.addEventListener("ended", () => {
            if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
        });
        // Falls es aus irgendeinem Grund pausiert, Puls aus
        siaAudio.addEventListener("pause", () => {
            if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
        });
    }

    if (siaAudio.paused) {
        // Andere Button-Instanzen (falls Modal mehrfach geöffnet) sicherheitshalber deaktivieren
        document.querySelectorAll(".play-audio-btn.is-playing").forEach(el => el.classList.remove("is-playing"));

        siaAudio.currentTime = 0;
        const playPromise = siaAudio.play();
        if (siaBtnEl) siaBtnEl.classList.add("is-playing");

        // Browser können play() blocken, wenn kein User-Gesture erkannt wird.
        if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {
                if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
            });
        }
    } else {
        siaAudio.pause();
        siaAudio.currentTime = 0;
        if (siaBtnEl) siaBtnEl.classList.remove("is-playing");
    }
}

function stopSiaSnippet() {
    if (siaAudio) {
        siaAudio.pause();
        siaAudio.currentTime = 0;
    }
    if (siaBtnEl) {
        siaBtnEl.classList.remove("is-playing");
    }
    // Falls Modal neu gerendert wurde: alle eventuellen Buttons aufräumen
    document.querySelectorAll(".play-audio-btn.is-playing").forEach(el => el.classList.remove("is-playing"));
}

let examplesBuilt = false;

function buildExamplesOverlay() {
    if (examplesBuilt) return;
    examplesBuilt = true;

    const tabsEl = document.getElementById('examples-tabs');
    const contentEl = document.getElementById('examples-content');

    examplesData.forEach(function(ch, i) {
        // Tab button
        const tab = document.createElement('button');
        tab.className = 'examples-tab' + (i === 0 ? ' active' : '');
        tab.setAttribute('aria-label', ch.chapterNum);
        tab.innerHTML = ch.icon + '<span class="examples-tab-label">' + ch.tabLabel + '</span>';
        tab.addEventListener('click', function() { showChapter(i); });
        tabsEl.appendChild(tab);

        // Navigation dots HTML (pre-computed)
        const dotsHtml = examplesData.map(function(_, j) {
            return '<button class="examples-dot' + (j === i ? ' active' : '') + '" onclick="showChapter(' + j + ')" aria-label="Kapitel ' + (j + 1) + '"></button>';
        }).join('');

        // Chapter content
        const chapter = document.createElement('div');
        chapter.className = 'examples-chapter' + (i === 0 ? ' active' : '');
        chapter.id = 'ex-chapter-' + i;
        chapter.innerHTML =
            '<div class="examples-chapter-card">' +
                '<div class="examples-chapter-header">' +
                    '<div class="examples-chapter-icon">' + ch.icon + '</div>' +
                    '<div class="examples-chapter-meta">' +
                        '<span class="examples-chapter-num">' + ch.chapterNum + '</span>' +
                        '<h3 class="examples-chapter-title">' + ch.title + '</h3>' +
                    '</div>' +
                '</div>' +
                (ch.content
                    ? '<div class="examples-chapter-content">' + ch.content + '</div>'
                    : '<p class="examples-chapter-text">' + ch.text + '</p>') +
                '<div class="examples-chapter-nav">' +
                    '<button class="examples-nav-btn" onclick="showChapter(' + (i - 1) + ')"' + (i === 0 ? ' disabled' : '') + '>← Zurück</button>' +
                    '<div class="examples-dots">' + dotsHtml + '</div>' +
                    '<button class="examples-nav-btn" onclick="showChapter(' + (i + 1) + ')"' + (i === examplesData.length - 1 ? ' disabled' : '') + '>Weiter →</button>' +
                '</div>' +
            '</div>';
        contentEl.appendChild(chapter);
    });
}

function openExamples() {
    buildExamplesOverlay();
    showChapter(0);
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('examples-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeExamples() {
    document.getElementById('examples-overlay').classList.remove('active');
    document.getElementById('modal-overlay').classList.add('active');
}

function showChapter(index) {
    if (index < 0 || index >= examplesData.length) return;

    document.querySelectorAll('.examples-tab').forEach(function(tab, i) {
        tab.classList.toggle('active', i === index);
    });

    document.querySelectorAll('.examples-chapter').forEach(function(ch, i) {
        ch.classList.toggle('active', i === index);
    });

    document.getElementById('examples-content').scrollTop = 0;
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('examples-overlay').classList.contains('active')) {
        closeExamples();
    }
});
